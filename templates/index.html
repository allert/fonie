<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fonie</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0f;
      --surface: #18181b;
      --border: #2a2a2e;
      --accent: #7eeabc;
      --accent2: #5bc8ff;
      --warn: #ffb347;
      --danger: #ff6b6b;
      --text: #e8e8ec;
      --muted: #6b6b78;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    /* ── Layout ── */
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: auto 1fr;
      min-height: 100vh;
    }

    header {
      grid-column: 1 / -1;
      padding: 20px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .tag-status {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }

    .tag-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: background 0.3s;
    }

    .tag-dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .tag-dot.unknown {
      background: var(--warn);
      box-shadow: 0 0 8px var(--warn);
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    /* ── Mapping cards ── */
    .mapping-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
      position: relative;
      overflow: hidden;
    }

    .mapping-card.active-card {
      border-color: var(--accent);
    }

    .mapping-card.downloading {
      border-color: var(--accent2);
    }

    .mapping-card.error-card {
      border-color: var(--danger);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .card-thumb {
      width: 44px;
      height: 44px;
      border-radius: 6px;
      object-fit: cover;
      background: var(--border);
      flex-shrink: 0;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-weight: 500;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-artist {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-type {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--border);
      color: var(--muted);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .card-type.track {
      color: var(--accent);
      background: rgba(126, 234, 188, 0.1);
    }

    .card-type.album {
      color: var(--accent2);
      background: rgba(91, 200, 255, 0.1);
    }

    .card-type.playlist {
      color: var(--warn);
      background: rgba(255, 179, 71, 0.1);
    }

    .card-uid {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .btn-sm {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-sm:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .btn-sm.danger:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent2);
      border-radius: 1px;
      transition: width 0.5s;
    }

    .status-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      margin-top: 6px;
    }

    .status-label.downloading {
      color: var(--accent2);
    }

    .status-label.ready {
      color: var(--accent);
    }

    .status-label.error {
      color: var(--danger);
    }

    .status-label.pending {
      color: var(--muted);
    }

    /* ── Main area ── */
    .main {
      padding: 32px;
      overflow-y: auto;
    }

    .main h2 {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    /* ── Add mapping form ── */
    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 32px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    input,
    select {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus,
    select:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--muted);
    }

    .uid-field {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0e0e0f;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Search results ── */
    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .filter-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .filter-tab {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .filter-tab.active {
      background: var(--accent);
      color: #0e0e0f;
      border-color: var(--accent);
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 12px;
      max-height: 380px;
      overflow-y: auto;
    }

    .result-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .result-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .result-card.selected {
      border-color: var(--accent);
      background: rgba(126, 234, 188, 0.05);
    }

    .result-thumb {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      object-fit: cover;
      background: var(--border);
      margin-bottom: 10px;
    }

    .result-type {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .result-type.track {
      color: var(--accent);
    }

    .result-type.album {
      color: var(--accent2);
    }

    .result-type.playlist {
      color: var(--warn);
    }

    .result-title {
      font-weight: 500;
      font-size: 13px;
      margin-bottom: 2px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .result-artist {
      font-size: 11px;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .selected-summary {
      background: rgba(126, 234, 188, 0.08);
      border: 1px solid rgba(126, 234, 188, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 13px;
      display: none;
    }

    .selected-summary.visible {
      display: block;
    }

    .selected-summary strong {
      color: var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 13px;
    }

    /* ── Now playing banner ── */
    .now-playing {
      background: rgba(126, 234, 188, 0.06);
      border: 1px solid rgba(126, 234, 188, 0.15);
      border-radius: var(--radius);
      padding: 14px 18px;
      margin-bottom: 24px;
      display: none;
      align-items: center;
      gap: 14px;
    }

    .now-playing.visible {
      display: flex;
    }

    .np-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      animation: pulse 1.5s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes pulse {

      0%,
      100% {
        opacity: 1;
        transform: scale(1);
      }

      50% {
        opacity: 0.5;
        transform: scale(0.8);
      }
    }

    .np-text {
      flex: 1;
    }

    .np-title {
      font-weight: 500;
      font-size: 14px;
    }

    .np-artist {
      font-size: 12px;
      color: var(--muted);
    }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    /* ── Loading ── */
    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <header>
      <div class="logo">fonie</div>
      <div class="tag-status">
        <div class="tag-dot" id="tagDot"></div>
        <span id="tagLabel">no tag</span>
      </div>
    </header>

    <!-- Sidebar: mappings -->
    <aside class="sidebar">
      <h2>Mappings</h2>
      <div id="mappingsList">
        <div class="empty-state">No mappings yet</div>
      </div>
    </aside>

    <!-- Main: add mapping -->
    <main class="main">
      <div class="now-playing" id="nowPlaying">
        <div class="np-dot"></div>
        <div class="np-text">
          <div class="np-title" id="npTitle">—</div>
          <div class="np-artist" id="npArtist">—</div>
        </div>
      </div>

      <h2>Add Mapping</h2>
      <div class="add-form">

        <!-- UID row -->
        <div class="form-row">
          <div class="form-group">
            <label>Tag UID</label>
            <input type="text" id="uidInput" class="uid-field" placeholder="Scan a tag or enter manually…">
          </div>
        </div>

        <!-- Search row -->
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search YouTube Music…" style="flex:1">
          <button class="btn btn-ghost" onclick="doSearch()">Search</button>
        </div>

        <!-- Filter tabs -->
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
          <button class="filter-tab" onclick="setFilter('track', this)">Tracks</button>
          <button class="filter-tab" onclick="setFilter('album', this)">Albums</button>
          <button class="filter-tab" onclick="setFilter('playlist', this)">Playlists</button>
        </div>

        <!-- Results -->
        <div class="results-grid" id="resultsGrid">
          <div class="empty-state" style="grid-column:1/-1">Search for something to map</div>
        </div>

        <!-- Selected summary -->
        <div class="selected-summary" id="selectedSummary"></div>

        <!-- Submit -->
        <div style="margin-top:16px; display:flex; justify-content:flex-end;">
          <button class="btn btn-primary" id="addBtn" onclick="addMapping()" disabled>Map to tag</button>
        </div>
      </div>
    </main>

  </div>

  <script>
    let selectedResult = null;
    let currentFilter = 'all';
    let currentTag = null;

    // ── Tag polling ───────────────────────────────────────────────────────────────
    async function pollTag() {
      try {
        const r = await fetch('/api/current-tag');
        const t = await r.json();
        const dot = document.getElementById('tagDot');
        const label = document.getElementById('tagLabel');

        if (t.present) {
          currentTag = t;
          dot.className = 'tag-dot ' + (t.mapped ? 'active' : 'unknown');
          label.textContent = t.uid;

          // Pre-fill UID field if empty
          const uidInput = document.getElementById('uidInput');
          if (!uidInput.value) uidInput.value = t.uid;

          // Now playing
          if (t.mapped && t.title) {
            document.getElementById('nowPlaying').classList.add('visible');
            document.getElementById('npTitle').textContent = t.title;
            document.getElementById('npArtist').textContent = t.artist || '—';
          }
        } else {
          currentTag = null;
          dot.className = 'tag-dot';
          label.textContent = 'no tag';
          document.getElementById('nowPlaying').classList.remove('visible');
        }
      } catch (e) { }
    }

    // ── Mappings polling ──────────────────────────────────────────────────────────
    async function pollMappings() {
      try {
        const r = await fetch('/api/mappings');
        const mappings = await r.json();
        renderMappings(mappings);
      } catch (e) { }
    }

    function renderMappings(mappings) {
      const el = document.getElementById('mappingsList');
      const keys = Object.keys(mappings);
      if (!keys.length) {
        el.innerHTML = '<div class="empty-state">No mappings yet</div>';
        return;
      }

      el.innerHTML = keys.map(uid => {
        const m = mappings[uid];
        const isActive = currentTag && currentTag.uid === uid;
        const statusClass = m.status === 'error' ? 'error-card'
          : m.status === 'downloading' ? 'downloading' : '';
        const activeClass = isActive ? 'active-card' : '';

        const progressBar = m.status === 'downloading' ? `
      <div class="progress-bar">
        <div class="progress-fill" style="width:${m.progress || 0}%"></div>
      </div>
      <div class="status-label downloading">Downloading… ${m.progress || 0}%</div>
    ` : m.status === 'ready' ? `
      <div class="status-label ready">✓ Ready</div>
    ` : m.status === 'error' ? `
      <div class="status-label error">✗ ${m.error || 'Download failed'}</div>
    ` : `<div class="status-label pending">Pending…</div>`;

        const retryBtn = m.status === 'error'
          ? `<button class="btn-sm" onclick="retryMapping('${uid}')">Retry</button>` : '';

        return `
      <div class="mapping-card ${activeClass} ${statusClass}">
        <div class="card-top">
          <div class="card-info">
            <div class="card-title">${m.title || '—'}</div>
            <div class="card-artist">${m.artist || '—'}</div>
          </div>
          <span class="card-type ${m.type}">${m.type}</span>
        </div>
        <div class="card-uid">${uid}</div>
        ${progressBar}
        <div class="card-actions">
          ${retryBtn}
          <button class="btn-sm danger" onclick="deleteMapping('${uid}')">Delete</button>
        </div>
      </div>
    `;
      }).join('');
    }

    // ── Search ────────────────────────────────────────────────────────────────────
    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;

      const grid = document.getElementById('resultsGrid');
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="spinner"></div></div>';

      try {
        const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&type=${currentFilter}`);
        const results = await r.json();

        if (!results.length) {
          grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No results found</div>';
          return;
        }

        grid.innerHTML = results.map((item, i) => `
      <div class="result-card" onclick="selectResult(${i})" data-index="${i}">
        <img class="result-thumb" src="${item.thumbnail || ''}" onerror="this.style.display='none'">
        <div class="result-type ${item.type}">${item.type}</div>
        <div class="result-title">${item.title}</div>
        <div class="result-artist">${item.artist}${item.duration ? ' · ' + item.duration : ''}${item.year ? ' · ' + item.year : ''}${item.count ? ' · ' + item.count + ' tracks' : ''}</div>
      </div>
    `).join('');

        // Store results
        grid._results = results;
        selectedResult = null;
        document.getElementById('selectedSummary').classList.remove('visible');
        document.getElementById('addBtn').disabled = true;

      } catch (e) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">Search failed</div>';
      }
    }

    function selectResult(i) {
      const grid = document.getElementById('resultsGrid');
      const results = grid._results;
      if (!results) return;

      selectedResult = results[i];
      document.querySelectorAll('.result-card').forEach((c, idx) => {
        c.classList.toggle('selected', idx === i);
      });

      const summary = document.getElementById('selectedSummary');
      summary.classList.add('visible');
      summary.innerHTML = `
    <strong>${selectedResult.title}</strong> by ${selectedResult.artist}
    <span style="color:var(--muted);margin-left:8px;">${selectedResult.type}</span>
  `;

      document.getElementById('addBtn').disabled = !document.getElementById('uidInput').value.trim();
    }

    // Allow pressing Enter to search
    document.addEventListener('DOMContentLoaded', () => {
      document.getElementById('searchInput').addEventListener('keydown', e => {
        if (e.key === 'Enter') doSearch();
      });
      document.getElementById('uidInput').addEventListener('input', () => {
        document.getElementById('addBtn').disabled = !document.getElementById('uidInput').value.trim() || !selectedResult;
      });
    });

    // ── Mapping CRUD ──────────────────────────────────────────────────────────────
    async function addMapping() {
      const uid = document.getElementById('uidInput').value.trim();
      if (!uid || !selectedResult) return;

      const btn = document.getElementById('addBtn');
      btn.disabled = true;
      btn.textContent = 'Mapping…';

      try {
        const r = await fetch('/api/mappings/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid, ...selectedResult })
        });
        const data = await r.json();
        if (data.success) {
          document.getElementById('uidInput').value = '';
          selectedResult = null;
          document.getElementById('selectedSummary').classList.remove('visible');
          document.getElementById('resultsGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1">Search for something to map</div>';
          pollMappings();
        }
      } catch (e) { }

      btn.textContent = 'Map to tag';
      btn.disabled = false;
    }

    async function deleteMapping(uid) {
      if (!confirm('Delete this mapping?')) return;
      await fetch(`/api/mappings/delete/${uid}`, { method: 'POST' });
      pollMappings();
    }

    async function retryMapping(uid) {
      await fetch(`/api/mappings/retry/${uid}`, { method: 'POST' });
      pollMappings();
    }

    // ── Polling ───────────────────────────────────────────────────────────────────
    setInterval(pollTag, 1000);
    setInterval(pollMappings, 2000);
    pollTag();
    pollMappings();
  </script>
</body>

</html>
