<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fonie</title>
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #0e0e0f;
      --surface: #18181b;
      --border: #2a2a2e;
      --accent: #7eeabc;
      --accent2: #5bc8ff;
      --warn: #ffb347;
      --danger: #ff6b6b;
      --text: #e8e8ec;
      --muted: #6b6b78;
      --radius: 12px;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      min-height: 100vh;
    }

    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      grid-template-rows: auto auto 1fr;
      min-height: 100vh;
    }

    /* ── Header ── */
    header {
      grid-column: 1 / -1;
      padding: 18px 32px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo {
      font-family: 'DM Mono', monospace;
      font-size: 22px;
      font-weight: 500;
      color: var(--accent);
      letter-spacing: -0.5px;
    }

    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 20px;
    }

    /* ── Battery ── */
    .battery {
      display: flex;
      align-items: center;
      gap: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
    }

    .battery-icon {
      position: relative;
      width: 28px;
      height: 14px;
      border: 1.5px solid var(--muted);
      border-radius: 3px;
    }

    .battery-icon::after {
      content: '';
      position: absolute;
      right: -5px;
      top: 50%;
      transform: translateY(-50%);
      width: 3px;
      height: 6px;
      background: var(--muted);
      border-radius: 0 1px 1px 0;
    }

    .battery-fill {
      position: absolute;
      left: 1px;
      top: 1px;
      bottom: 1px;
      border-radius: 1px;
      background: var(--accent);
      transition: width 0.5s, background 0.3s;
    }

    .battery-fill.low {
      background: var(--danger);
    }

    .battery-fill.medium {
      background: var(--warn);
    }

    .battery-fill.charging {
      background: var(--accent2);
    }

    .battery-label {
      color: var(--muted);
    }

    .battery-label.charging {
      color: var(--accent2);
    }

    .charging-bolt {
      color: var(--accent2);
      font-size: 11px;
      animation: boltpulse 1s ease-in-out infinite;
    }

    @keyframes boltpulse {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: 0.3;
      }
    }

    /* ── Tag status ── */
    .tag-status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-family: 'DM Mono', monospace;
      font-size: 13px;
      color: var(--muted);
    }

    .tag-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--border);
      transition: all 0.3s;
    }

    .tag-dot.active {
      background: var(--accent);
      box-shadow: 0 0 8px var(--accent);
    }

    .tag-dot.unknown {
      background: var(--warn);
      box-shadow: 0 0 8px var(--warn);
    }

    /* ── Player bar ── */
    .player-bar {
      grid-column: 1 / -1;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      min-height: 72px;
    }

    .np-info {
      flex: 1;
      min-width: 0;
    }

    .np-title {
      font-weight: 500;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .np-artist {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
    }

    .np-idle {
      color: var(--muted);
      font-size: 13px;
      font-style: italic;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .ctrl-btn {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      font-size: 16px;
    }

    .ctrl-btn:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .ctrl-btn.primary {
      width: 44px;
      height: 44px;
      border-color: var(--accent);
      color: var(--accent);
      font-size: 18px;
    }

    .ctrl-btn.primary:hover {
      background: var(--accent);
      color: #0e0e0f;
    }

    .volume-group {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .vol-icon {
      color: var(--muted);
      font-size: 14px;
    }

    input[type=range] {
      -webkit-appearance: none;
      width: 100px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    input[type=range]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
    }

    .vol-label {
      font-family: 'DM Mono', monospace;
      font-size: 11px;
      color: var(--muted);
      width: 28px;
    }

    /* ── Sidebar ── */
    .sidebar {
      border-right: 1px solid var(--border);
      padding: 24px;
      overflow-y: auto;
    }

    .sidebar h2 {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    .mapping-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px;
      margin-bottom: 10px;
      transition: border-color 0.2s;
    }

    .mapping-card.active-card {
      border-color: var(--accent);
    }

    .mapping-card.downloading {
      border-color: var(--accent2);
    }

    .mapping-card.error-card {
      border-color: var(--danger);
    }

    .card-top {
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }

    .card-info {
      flex: 1;
      min-width: 0;
    }

    .card-title {
      font-weight: 500;
      font-size: 14px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-artist {
      font-size: 12px;
      color: var(--muted);
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .card-type {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      padding: 2px 6px;
      border-radius: 4px;
      background: var(--border);
      color: var(--muted);
      text-transform: uppercase;
      flex-shrink: 0;
    }

    .card-type.track {
      color: var(--accent);
      background: rgba(126, 234, 188, 0.1);
    }

    .card-type.album {
      color: var(--accent2);
      background: rgba(91, 200, 255, 0.1);
    }

    .card-type.playlist {
      color: var(--warn);
      background: rgba(255, 179, 71, 0.1);
    }

    .card-uid {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      color: var(--muted);
      margin-top: 8px;
    }

    .card-actions {
      display: flex;
      gap: 6px;
      margin-top: 10px;
    }

    .btn-sm {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-sm:hover {
      border-color: var(--text);
      color: var(--text);
    }

    .btn-sm.danger:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    .progress-bar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-top: 10px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: var(--accent2);
      border-radius: 1px;
      transition: width 0.5s;
    }

    .status-label {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      margin-top: 6px;
    }

    .status-label.downloading {
      color: var(--accent2);
    }

    .status-label.ready {
      color: var(--accent);
    }

    .status-label.error {
      color: var(--danger);
    }

    .status-label.pending {
      color: var(--muted);
    }

    /* ── Main ── */
    .main {
      padding: 32px;
      overflow-y: auto;
    }

    .main h2 {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 20px;
    }

    .add-form {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 24px;
    }

    .form-row {
      display: flex;
      gap: 10px;
      margin-bottom: 12px;
    }

    .form-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 0.5px;
      color: var(--muted);
      text-transform: uppercase;
    }

    input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      padding: 10px 12px;
      outline: none;
      transition: border-color 0.15s;
      width: 100%;
    }

    input:focus {
      border-color: var(--accent);
    }

    input::placeholder {
      color: var(--muted);
    }

    .uid-field {
      font-family: 'DM Mono', monospace;
      font-size: 13px;
    }

    .btn {
      padding: 10px 20px;
      border-radius: 8px;
      border: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
    }

    .btn-primary {
      background: var(--accent);
      color: #0e0e0f;
    }

    .btn-primary:hover {
      filter: brightness(1.1);
    }

    .btn-primary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .search-bar {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
    }

    .filter-tabs {
      display: flex;
      gap: 4px;
      margin-bottom: 16px;
    }

    .filter-tab {
      padding: 5px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      transition: all 0.15s;
      font-family: 'DM Sans', sans-serif;
    }

    .filter-tab.active {
      background: var(--accent);
      color: #0e0e0f;
      border-color: var(--accent);
    }

    .results-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
      gap: 12px;
      max-height: 360px;
      overflow-y: auto;
    }

    .result-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .result-card:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .result-card.selected {
      border-color: var(--accent);
      background: rgba(126, 234, 188, 0.05);
    }

    .result-thumb {
      width: 100%;
      aspect-ratio: 1;
      border-radius: 8px;
      object-fit: cover;
      background: var(--border);
      margin-bottom: 10px;
    }

    .result-type {
      font-family: 'DM Mono', monospace;
      font-size: 10px;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 4px;
    }

    .result-type.track {
      color: var(--accent);
    }

    .result-type.album {
      color: var(--accent2);
    }

    .result-type.playlist {
      color: var(--warn);
    }

    .result-title {
      font-weight: 500;
      font-size: 13px;
      margin-bottom: 2px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .result-artist {
      font-size: 11px;
      color: var(--muted);
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
    }

    .selected-summary {
      background: rgba(126, 234, 188, 0.08);
      border: 1px solid rgba(126, 234, 188, 0.2);
      border-radius: 8px;
      padding: 12px 16px;
      margin-top: 16px;
      font-size: 13px;
      display: none;
    }

    .selected-summary.visible {
      display: block;
    }

    .selected-summary strong {
      color: var(--accent);
    }

    .empty-state {
      text-align: center;
      padding: 40px;
      color: var(--muted);
      font-size: 13px;
    }

    ::-webkit-scrollbar {
      width: 4px;
    }

    ::-webkit-scrollbar-track {
      background: transparent;
    }

    ::-webkit-scrollbar-thumb {
      background: var(--border);
      border-radius: 2px;
    }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: inline-block;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>
  <div class="app">

    <header>
      <div class="logo">fonie</div>
      <div class="header-right">
        <!-- Battery -->
        <div class="battery" id="battery" style="display:none">
          <div class="battery-icon">
            <div class="battery-fill" id="battFill"></div>
          </div>
          <span class="battery-label" id="battLabel">—</span>
          <span class="charging-bolt" id="battBolt" style="display:none">⚡</span>
        </div>

        <!-- Tag status -->
        <div class="tag-status">
          <div class="tag-dot" id="tagDot"></div>
          <span id="tagLabel">no tag</span>
        </div>
      </div>
    </header>

    <!-- Player bar -->
    <div class="player-bar">
      <div class="np-info">
        <div id="npIdle" class="np-idle">Place a tag to play</div>
        <div id="npTrack" style="display:none">
          <div class="np-title" id="npTitle">—</div>
          <div class="np-artist" id="npArtist">—</div>
        </div>
      </div>
      <div class="controls">
        <button class="ctrl-btn" onclick="prevTrack()" title="Previous">&#9664;&#9664;</button>
        <button class="ctrl-btn primary" id="playPauseBtn" onclick="togglePlayPause()">&#9654;</button>
        <button class="ctrl-btn" onclick="nextTrack()" title="Next">&#9654;&#9654;</button>
      </div>
      <div class="volume-group">
        <span class="vol-icon">&#128266;</span>
        <input type="range" id="volumeSlider" min="0" max="100" value="80" oninput="setVolume(this.value)">
        <span class="vol-label" id="volLabel">80</span>
      </div>
    </div>

    <!-- Sidebar -->
    <aside class="sidebar">
      <h2>Mappings</h2>
      <div id="mappingsList">
        <div class="empty-state">No mappings yet</div>
      </div>
    </aside>

    <!-- Main -->
    <main class="main">
      <h2>Add Mapping</h2>
      <div class="add-form">
        <div class="form-row">
          <div class="form-group">
            <label>Tag UID</label>
            <input type="text" id="uidInput" class="uid-field" placeholder="Scan a tag or enter manually…">
          </div>
        </div>
        <div class="search-bar">
          <input type="text" id="searchInput" placeholder="Search YouTube Music…" style="flex:1">
          <button class="btn btn-ghost" onclick="doSearch()">Search</button>
        </div>
        <div class="filter-tabs">
          <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
          <button class="filter-tab" onclick="setFilter('track', this)">Tracks</button>
          <button class="filter-tab" onclick="setFilter('album', this)">Albums</button>
          <button class="filter-tab" onclick="setFilter('playlist', this)">Playlists</button>
        </div>
        <div class="results-grid" id="resultsGrid">
          <div class="empty-state" style="grid-column:1/-1">Search for something to map</div>
        </div>
        <div class="selected-summary" id="selectedSummary"></div>
        <div style="margin-top:16px; display:flex; justify-content:flex-end;">
          <button class="btn btn-primary" id="addBtn" onclick="addMapping()" disabled>Map to tag</button>
        </div>
      </div>
    </main>
  </div>

  <script>
    let selectedResult = null;
    let currentFilter = 'all';
    let pbState = { playing: false, paused: false, volume: 80 };

    // ── Battery ───────────────────────────────────────────────────────────────────
    async function pollBattery() {
      try {
        const r = await fetch('/api/battery');
        const b = await r.json();
        if (b.level === null) return;

        document.getElementById('battery').style.display = 'flex';

        const fill = document.getElementById('battFill');
        const label = document.getElementById('battLabel');
        const bolt = document.getElementById('battBolt');

        const pct = Math.max(0, Math.min(100, b.level));
        fill.style.width = `${pct}%`;
        fill.className = 'battery-fill' +
          (b.charging ? ' charging' : pct <= 20 ? ' low' : pct <= 50 ? ' medium' : '');

        label.textContent = `${pct}%`;
        label.className = 'battery-label' + (b.charging ? ' charging' : '');
        bolt.style.display = b.charging ? 'inline' : 'none';
      } catch (e) { }
    }

    // ── Playback controls ─────────────────────────────────────────────────────────
    async function togglePlayPause() {
      if (pbState.paused) {
        await fetch('/api/playback/resume', { method: 'POST' });
      } else if (pbState.playing) {
        await fetch('/api/playback/pause', { method: 'POST' });
      }
      pollPlayback();
    }

    async function nextTrack() { await fetch('/api/playback/next', { method: 'POST' }); }
    async function prevTrack() { await fetch('/api/playback/prev', { method: 'POST' }); }

    let volumeTimer = null;
    function setVolume(val) {
      document.getElementById('volLabel').textContent = val;
      clearTimeout(volumeTimer);
      volumeTimer = setTimeout(async () => {
        await fetch('/api/playback/volume', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ volume: parseInt(val) })
        });
      }, 200);
    }

    async function pollPlayback() {
      try {
        const r = await fetch('/api/playback/status');
        pbState = await r.json();
        const btn = document.getElementById('playPauseBtn');
        btn.innerHTML = pbState.playing ? '&#9646;&#9646;' : '&#9654;';
        const slider = document.getElementById('volumeSlider');
        const label = document.getElementById('volLabel');
        slider.value = pbState.volume;
        label.textContent = pbState.volume;
      } catch (e) { }
    }

    // ── Tag polling ───────────────────────────────────────────────────────────────
    async function pollTag() {
      try {
        const r = await fetch('/api/current-tag');
        const t = await r.json();
        const dot = document.getElementById('tagDot');
        const label = document.getElementById('tagLabel');

        if (t.present) {
          dot.className = 'tag-dot ' + (t.mapped ? 'active' : 'unknown');
          label.textContent = t.uid;
          const uidInput = document.getElementById('uidInput');
          if (!uidInput.value) uidInput.value = t.uid;
          if (t.mapped && t.title) {
            document.getElementById('npIdle').style.display = 'none';
            document.getElementById('npTrack').style.display = 'block';
            document.getElementById('npTitle').textContent = t.title;
            document.getElementById('npArtist').textContent = t.artist || '—';
          }
        } else {
          dot.className = 'tag-dot';
          label.textContent = 'no tag';
          document.getElementById('npIdle').style.display = 'block';
          document.getElementById('npTrack').style.display = 'none';
        }
      } catch (e) { }
    }

    // ── Mappings ──────────────────────────────────────────────────────────────────
    async function pollMappings() {
      try {
        const r = await fetch('/api/mappings');
        renderMappings(await r.json());
      } catch (e) { }
    }

    function renderMappings(mappings) {
      const el = document.getElementById('mappingsList');
      const keys = Object.keys(mappings);
      if (!keys.length) { el.innerHTML = '<div class="empty-state">No mappings yet</div>'; return; }
      el.innerHTML = keys.map(uid => {
        const m = mappings[uid];
        const statusClass = m.status === 'error' ? 'error-card' : m.status === 'downloading' ? 'downloading' : '';
        const progressBar = m.status === 'downloading'
          ? `<div class="progress-bar"><div class="progress-fill" style="width:${m.progress || 0}%"></div></div>
         <div class="status-label downloading">Downloading… ${m.progress || 0}%</div>`
          : m.status === 'ready' ? `<div class="status-label ready">✓ Ready</div>`
            : m.status === 'error' ? `<div class="status-label error">✗ ${m.error || 'Download failed'}</div>`
              : `<div class="status-label pending">Pending…</div>`;
        const retryBtn = m.status === 'error'
          ? `<button class="btn-sm" onclick="retryMapping('${uid}')">Retry</button>` : '';
        return `
      <div class="mapping-card ${statusClass}">
        <div class="card-top">
          <div class="card-info">
            <div class="card-title">${m.title || '—'}</div>
            <div class="card-artist">${m.artist || '—'}</div>
          </div>
          <span class="card-type ${m.type}">${m.type}</span>
        </div>
        <div class="card-uid">${uid}</div>
        ${progressBar}
        <div class="card-actions">
          ${retryBtn}
          <button class="btn-sm danger" onclick="deleteMapping('${uid}')">Delete</button>
        </div>
      </div>`;
      }).join('');
    }

    // ── Search ────────────────────────────────────────────────────────────────────
    function setFilter(f, el) {
      currentFilter = f;
      document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
      el.classList.add('active');
    }

    async function doSearch() {
      const q = document.getElementById('searchInput').value.trim();
      if (!q) return;
      const grid = document.getElementById('resultsGrid');
      grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1"><div class="spinner"></div></div>';
      try {
        const r = await fetch(`/api/search?q=${encodeURIComponent(q)}&type=${currentFilter}`);
        const results = await r.json();
        if (!results.length) { grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">No results</div>'; return; }
        grid.innerHTML = results.map((item, i) => `
      <div class="result-card" onclick="selectResult(${i})">
        <img class="result-thumb" src="${item.thumbnail || ''}" onerror="this.style.display='none'">
        <div class="result-type ${item.type}">${item.type}</div>
        <div class="result-title">${item.title}</div>
        <div class="result-artist">${item.artist}${item.duration ? ' · ' + item.duration : ''}${item.year ? ' · ' + item.year : ''}${item.count ? ' · ' + item.count + ' tracks' : ''}</div>
      </div>`).join('');
        grid._results = results;
        selectedResult = null;
        document.getElementById('selectedSummary').classList.remove('visible');
        document.getElementById('addBtn').disabled = true;
      } catch (e) {
        grid.innerHTML = '<div class="empty-state" style="grid-column:1/-1">Search failed</div>';
      }
    }

    function selectResult(i) {
      const grid = document.getElementById('resultsGrid');
      if (!grid._results) return;
      selectedResult = grid._results[i];
      document.querySelectorAll('.result-card').forEach((c, idx) => c.classList.toggle('selected', idx === i));
      const summary = document.getElementById('selectedSummary');
      summary.classList.add('visible');
      summary.innerHTML = `<strong>${selectedResult.title}</strong> by ${selectedResult.artist} <span style="color:var(--muted);margin-left:8px;">${selectedResult.type}</span>`;
      document.getElementById('addBtn').disabled = !document.getElementById('uidInput').value.trim();
    }

    // ── Mapping CRUD ──────────────────────────────────────────────────────────────
    async function addMapping() {
      const uid = document.getElementById('uidInput').value.trim();
      if (!uid || !selectedResult) return;
      const btn = document.getElementById('addBtn');
      btn.disabled = true; btn.textContent = 'Mapping…';
      try {
        const r = await fetch('/api/mappings/add', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ uid, ...selectedResult })
        });
        if ((await r.json()).success) {
          document.getElementById('uidInput').value = '';
          selectedResult = null;
          document.getElementById('selectedSummary').classList.remove('visible');
          document.getElementById('resultsGrid').innerHTML = '<div class="empty-state" style="grid-column:1/-1">Search for something to map</div>';
          pollMappings();
        }
      } catch (e) { }
      btn.textContent = 'Map to tag'; btn.disabled = false;
    }

    async function deleteMapping(uid) {
      if (!confirm('Delete this mapping?')) return;
      await fetch(`/api/mappings/delete/${uid}`, { method: 'POST' });
      pollMappings();
    }

    async function retryMapping(uid) {
      await fetch(`/api/mappings/retry/${uid}`, { method: 'POST' });
      pollMappings();
    }

    // ── Init ──────────────────────────────────────────────────────────────────────
    document.getElementById('searchInput').addEventListener('keydown', e => { if (e.key === 'Enter') doSearch(); });
    document.getElementById('uidInput').addEventListener('input', () => {
      document.getElementById('addBtn').disabled = !document.getElementById('uidInput').value.trim() || !selectedResult;
    });

    setInterval(pollTag, 1000);
    setInterval(pollMappings, 2000);
    setInterval(pollPlayback, 1000);
    setInterval(pollBattery, 30000);  // every 30s, matches Pico update rate
    pollTag(); pollMappings(); pollPlayback(); pollBattery();
  </script>
</body>

</html>
